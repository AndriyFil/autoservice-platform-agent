services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8000"
    environment:
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: autoservice
      DB_USERNAME: autoservice
      DB_PASSWORD: autoservice
      VITE_DEV_SERVER_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_APP_NAME: AutoService
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoservice
      POSTGRES_USER: autoservice
      POSTGRES_PASSWORD: autoservice
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoservice -d autoservice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  node-modules:
